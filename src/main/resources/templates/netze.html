<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Geisternetze</title>
</head>
<body>
<h1>Gemeldete Geisternetze</h1>

<p>
  <a th:href="@{/melden}">Neues Geisternetz melden</a> |
  <a th:href="@{/bergung}">Offene Bergungen anzeigen</a>
</p>

<table border="1" cellpadding="6">
  <thead>
  <tr>
    <th>ID</th>
    <th>Breitengrad</th>
    <th>Längengrad</th>
    <th>Größe</th>
    <th>Status</th>
    <th>Meldende Person</th>
    <th>Bergende Person</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="netz : ${netze}">
    <td th:text="${netz.id}"></td>
    <td th:text="${netz.latitude}"></td>
    <td th:text="${netz.longitude}"></td>
    <td th:text="${netz.groesse}"></td>
    <td th:text="${netz.status}"></td>
    <td th:text="${netz.melder != null ? netz.melder.name : 'anonym'}"></td>
    <td th:text="${netz.berger != null ? netz.berger.name : '—'}"></td>
  </tr>
  <tr th:if="${netze.isEmpty()}">
    <td colspan="7">Noch keine Geisternetze gemeldet.</td>
  </tr>
  </tbody>
</table>
</body>
</html>
